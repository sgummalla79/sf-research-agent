services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       pragna
      POSTGRES_USER:     pragna
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pragna"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    image: ghcr.io/sgummalla79/pragna-api:latest
    restart: unless-stopped
    env_file: backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - web

  ui:
    image: ghcr.io/sgummalla79/pragna-ui:latest
    restart: unless-stopped
    networks:
      - web

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - ui
    networks:
      - web

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
