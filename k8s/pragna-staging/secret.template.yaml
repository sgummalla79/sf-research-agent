# TEMPLATE ONLY — do not commit with real values.
# On the cluster run:
#   kubectl apply -f k8s/pragna-staging/secret.yaml -n pragna-staging
#
# One-time cluster setup:
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=YOUR_GITHUB_USERNAME \
#     --docker-password=YOUR_PAT \
#     --namespace=pragna-staging
#
apiVersion: v1
kind: Secret
metadata:
  name: pragna-staging-secrets
  namespace: pragna-staging
type: Opaque
stringData:
  # PostgreSQL credentials (must match postgres.yaml)
  POSTGRES_USER:     "pragna"
  POSTGRES_PASSWORD: "REPLACE_WITH_STAGING_DB_PASSWORD"

  # App secrets — use different values from production
  SETTINGS_SECRET:    "REPLACE"
  DATABASE_URL:       "postgresql://pragna:REPLACE_WITH_STAGING_DB_PASSWORD@postgres:5432/pragna_staging"
  JWT_SECRET:         "REPLACE"
  FRONTEND_URL:       "https://pragna-staging.sgummallaworks.com"
  ALLOWED_ORIGINS:    "https://pragna-staging.sgummallaworks.com"
  AUTH0_DOMAIN:       "REPLACE"
  AUTH0_CLIENT_ID:    "REPLACE"
  AUTH0_CLIENT_SECRET: "REPLACE"
  AUTH0_CALLBACK_URL: "https://pragna-staging.sgummallaworks.com/auth/callback"
