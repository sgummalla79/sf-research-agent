# UI — serves the Vue SPA
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pragna-staging-ui
  namespace: pragna-staging
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - pragna-staging.sgummallaworks.com
      secretName: pragna-staging-tls
  rules:
    - host: pragna-staging.sgummallaworks.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pragna-ui
                port:
                  number: 80
---
# API — proxies /api and /auth to external API, prepends /pragna
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pragna-staging-api
  namespace: pragna-staging
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: pragna-staging-api-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: pragna-staging.sgummallaworks.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: pragna-api-external
                port:
                  number: 443
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: pragna-api-external
                port:
                  number: 443
