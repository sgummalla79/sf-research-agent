apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pragna-staging
  namespace: pragna-staging
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - pragna-staging.sgummallaworks.com
      secretName: pragna-staging-tls
  rules:
    - host: pragna-staging.sgummallaworks.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pragna-ui
                port:
                  number: 80
