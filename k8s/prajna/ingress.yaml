apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prajna
  namespace: prajna
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - yourdomain.com
      secretName: prajna-tls
  rules:
    - host: yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: prajna-api
                port:
                  number: 8000
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: prajna-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prajna-ui
                port:
                  number: 80