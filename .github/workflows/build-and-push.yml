name: Build and Push

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      bump:
        description: 'Version bump (production only)'
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

env:
  OWNER: ${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  # ── Frontend tests ─────────────────────────────────────────────────────────
  test:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'push' || inputs.environment == 'staging') && 'staging' || 'main' }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run tests
        working-directory: frontend
        run: npm test

  # ── Staging deploy ─────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    needs: [test]
    if: github.event_name == 'push' || inputs.environment == 'staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push pragna-ui (staging)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ui
          push: true
          no-cache: true
          tags: |
            ghcr.io/${{ env.OWNER }}/pragna-ui:staging
            ghcr.io/${{ env.OWNER }}/pragna-ui:staging-${{ steps.sha.outputs.short }}

      - name: Deploy to staging cluster
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            SHA="${{ steps.sha.outputs.short }}"
            TAG="staging-${SHA}"

            echo "=== Deploying UI to staging ==="
            kubectl set image deployment/pragna-ui \
              pragna-ui=ghcr.io/${{ github.repository_owner }}/pragna-ui:${TAG} \
              -n pragna-staging

            echo "=== Waiting for rollout ==="
            kubectl rollout status deployment/pragna-ui -n pragna-staging --timeout=120s

            echo "=== Health check ==="
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                https://pragna-staging.sgummallaworks.com/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✓ Staging healthy (attempt $i)"
                break
              fi
              echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
              sleep 10
            done

            echo "=== Staging UI deploy complete: ${TAG} ==="
            kubectl get pods -n pragna-staging

      - name: Summary
        if: always()
        run: |
          echo "### Staging UI deploy: \`staging-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://pragna-staging.sgummallaworks.com" >> $GITHUB_STEP_SUMMARY

  # ── Production: build & version ───────────────────────────────────────────
  build:
    name: Build production image
    needs: [test]
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.new }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump version
        id: version
        run: |
          current=$(cat VERSION | tr -d '[:space:]')
          major=$(echo $current | cut -d. -f1)
          minor=$(echo $current | cut -d. -f2)
          patch=$(echo $current | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          new="$major.$minor.$patch"
          echo "$new" > VERSION
          echo "new=$new" >> $GITHUB_OUTPUT
          echo "previous=$current" >> $GITHUB_OUTPUT
          echo "Bumped $current → $new"

      - name: Generate release notes
        run: |
          version="${{ steps.version.outputs.new }}"
          previous="${{ steps.version.outputs.previous }}"
          date=$(date -u +"%Y-%m-%d")

          last_bump=$(git log --oneline | grep -m1 "chore: bump version to ${previous}" | awk '{print $1}')

          if [ -z "$last_bump" ]; then
            commits=$(git log --no-merges --format="%s" -100)
          else
            commits=$(git log --no-merges --format="%s" "${last_bump}..HEAD")
          fi

          features=$(echo "$commits" | grep -E "^feat:"          | sed 's/^feat: /- /'     || true)
          fixes=$(echo "$commits"    | grep -E "^(fix|hotfix):"  | sed 's/^\(fix\|hotfix\): /- /' || true)
          docs=$(echo "$commits"     | grep -E "^docs:"          | sed 's/^docs: /- /'     || true)
          refactor=$(echo "$commits" | grep -E "^refactor:"      | sed 's/^refactor: /- /' || true)

          {
            echo "# v${version} — ${date}"
            echo ""
            if [ -n "$features" ];  then echo "## Features";      echo "$features";  echo ""; fi
            if [ -n "$fixes" ];     then echo "## Bug Fixes";     echo "$fixes";     echo ""; fi
            if [ -n "$refactor" ];  then echo "## Refactoring";   echo "$refactor";  echo ""; fi
            if [ -n "$docs" ];      then echo "## Documentation"; echo "$docs";      echo ""; fi
            if [ -z "$features" ] && [ -z "$fixes" ] && [ -z "$refactor" ] && [ -z "$docs" ]; then
              echo "No notable changes."; echo ""
            fi
          } > "release-notes/v${version}.md"

          cat "release-notes/v${version}.md"

      - name: Commit version bump and release notes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION release-notes/
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git push

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push pragna-ui
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ui
          push: true
          no-cache: true
          tags: |
            ghcr.io/${{ env.OWNER }}/pragna-ui:${{ steps.version.outputs.new }}
            ghcr.io/${{ env.OWNER }}/pragna-ui:latest

  # ── Production: rolling deploy ─────────────────────────────────────────────
  deploy-production:
    name: Deploy UI to production
    needs: [build]
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            VERSION="${{ needs.build.outputs.version }}"
            IMAGE="ghcr.io/${{ github.repository_owner }}/pragna-ui:${VERSION}"

            echo "=== Deploying pragna-ui v${VERSION} ==="
            kubectl set image deployment/pragna-ui \
              pragna-ui="${IMAGE}" \
              -n pragna
            kubectl rollout status deployment/pragna-ui -n pragna --timeout=120s

            echo "=== Health check ==="
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                https://pragna.sgummallaworks.com/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✓ Production healthy (attempt $i)"
                break
              fi
              echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
              sleep 10
            done

            echo "=== Production UI deploy complete: v${VERSION} ==="

      - name: Summary
        if: always()
        run: |
          echo "### Production UI deploy: v${{ needs.build.outputs.version }}" >> $GITHUB_STEP_SUMMARY
